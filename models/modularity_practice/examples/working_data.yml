version: 2

models:
  - name: working_data
    description: "customer-level reference data used for examples"
    columns:
      - name: customer_id
        description: "unique identifier for the customer"
        tests:
          - not_null
          - unique
      - name: full_name
        description: "customer full name"
      - name: surname
        description: "customer family name"
      - name: givenname
        description: "customer given name"
      - name: status
        description: "current order fulfillment status associated with the record"
